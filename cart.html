<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="cart.css">
</head>

        <path d="M20 18 L22.5 13 L25 17 L31 10 L37 17 L39.5 13 L42 18" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <ellipse cx="31" cy="28" rx="10" ry="11" fill="#4F4D46" stroke="#fff" stroke-width="1"/>
        <circle cx="27" cy="27" r="1.2" fill="#fff"/>
        <circle cx="35" cy="27" r="1.2" fill="#fff"/>
        <path d="M27 31 Q31 34 35 31" stroke="#fff" stroke-width="1" fill="none" stroke-linecap="round"/>
        <path d="M19 38 Q15 44 17 48 Q22 44 23 40" fill="#fff" opacity="0.9"/>
        <path d="M43 38 Q47 44 45 48 Q40 44 39 40" fill="#fff" opacity="0.9"/>
      </svg>
    </a>
    <ul class="nav-links">
      <li><a href="starbucks_menu.html">Menu</a></li>
      <li><a href="starbucks_rewards.html">Rewards</a></li>
      <li><a href="starbucks_giftcards.html">Gift Cards</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <a href="#" class="find-store">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Find a store
    </a>
    <a href="#" class="btn-signin">Sign in</a>
    <a href="#" class="btn-join">Join now</a>
    <a href="cart.html" class="nav-cart active" aria-label="View cart">

<main class="cart-main">
  <div class="cart-inner">
    <h1 class="cart-heading">Your Order</h1>
    <div class="cart-layout">
      <section class="cart-items" id="cart-items">
        <p class="cart-empty">Loading your order…</p>
      </section>
      <aside class="cart-summary" id="cart-summary"></aside>
    </div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-cols">
      <div class="footer-col"><h4>About Us</h4><a href="#">Our Company</a><a href="#">Our Coffee</a></div>
      <div class="footer-col"><h4>Careers</h4><a href="#">U.S. Careers</a></div>
      <div class="footer-col"><h4>Order and Pick Up</h4><a href="#">Order on the App</a><a href="#">Delivery</a></div>
    </div>
    <hr class="footer-divider">
    <p class="footer-copy">&copy; 2024 Moon's Coffee. All rights reserved.</p>
  </div>
</footer>

<script src="js/cart.js"></script>
<script>
(function () {
  function fmt(n) { return '$' + n.toFixed(2); }

  function configLabel(config) {
    if (!config || !Object.keys(config).length) return '';
    var parts = [];
    Object.entries(config).forEach(function ([k, v]) {
      if (v === null || v === '' || v === 'none' || v === 0) return;
      if (typeof v === 'number' && v > 0) parts.push(v + ' ' + k.replace(/_/g,' '));
      else parts.push(String(v).replace(/_/g,' '));
    });
    return parts.join(' · ');
  }

  function imgUrl(url) {
    if (!url) return '';
    return url + (url.includes('?') ? '&' : '?') + 'wid=120';
  }

  function renderItems(cart) {
    var el = document.getElementById('cart-items');
    if (!cart.length) {
      el.innerHTML = '<div class="cart-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg><p>Your order is empty.</p><a href="starbucks_menu.html" class="btn-browse">Browse the menu</a></div>';
      return;
    }
    el.innerHTML = '<ul class="cart-list">' +
      cart.map(function (item) {
        var label = configLabel(item.config);
        return '<li class="cart-item" data-id="' + item.id + '">' +
          '<div class="cart-item-img">' +
            (item.imageURL ? '<img src="' + imgUrl(item.imageURL) + '" alt="' + item.name + '">' : '') +
          '</div>' +
          '<div class="cart-item-info">' +
            '<p class="cart-item-name">' + item.name + '</p>' +
            '<p class="cart-item-meta">' + (item.size || '') + (label ? ' · ' + label : '') + '</p>' +
            '<p class="cart-item-price">' + fmt(item.price || 0) + ' each</p>' +
          '</div>' +
          '<div class="cart-item-actions">' +
            '<div class="qty-control">' +
              '<button class="qty-btn" data-action="dec" aria-label="Decrease quantity">−</button>' +
              '<span class="qty-val">' + item.qty + '</span>' +
              '<button class="qty-btn" data-action="inc" aria-label="Increase quantity">+</button>' +
            '</div>' +
            '<button class="btn-remove" data-action="remove" aria-label="Remove item">Remove</button>' +
          '</div>' +
        '</li>';
      }).join('') +
    '</ul>';

    // Bind controls
    el.querySelectorAll('.cart-item').forEach(function (row) {
      var id = row.dataset.id;
      row.querySelector('[data-action="dec"]').addEventListener('click', function () {
        var cur = parseInt(row.querySelector('.qty-val').textContent, 10);
        window.MoonCart.updateQty(id, cur - 1);
        refresh();
      });
      row.querySelector('[data-action="inc"]').addEventListener('click', function () {
        var cur = parseInt(row.querySelector('.qty-val').textContent, 10);
        window.MoonCart.updateQty(id, cur + 1);
        refresh();
      });
      row.querySelector('[data-action="remove"]').addEventListener('click', function () {
        window.MoonCart.removeItem(id);
        refresh();
      });
    });
  }

  function renderSummary(cart) {
    var el = document.getElementById('cart-summary');
    if (!cart.length) { el.innerHTML = ''; return; }
    var subtotal = window.MoonCart.getTotal();
    var tax = subtotal * 0.0875;
    var total = subtotal + tax;
    el.innerHTML =
      '<div class="summary-box">' +
        '<h2 class="summary-title">Order Summary</h2>' +
        '<div class="summary-row"><span>Subtotal</span><span>' + fmt(subtotal) + '</span></div>' +
        '<div class="summary-row"><span>Tax (8.75%)</span><span>' + fmt(tax) + '</span></div>' +
        '<hr class="summary-rule">' +
        '<div class="summary-row summary-total"><span>Total</span><span>' + fmt(total) + '</span></div>' +
        '<a href="checkout.html" class="btn-checkout">Proceed to Checkout</a>' +
        '<button class="btn-clear" id="btn-clear">Clear order</button>' +
      '</div>';

    document.getElementById('btn-clear').addEventListener('click', function () {
      if (confirm('Clear your entire order?')) { window.MoonCart.clearCart(); refresh(); }
    });
  }

  function refresh() {
    var cart = window.MoonCart.getCart();
    renderItems(cart);
    renderSummary(cart);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', refresh);
  } else {
    refresh();
  }

  // Nav toggle
  var nav = document.getElementById('main-nav');
  var toggle = nav.querySelector('.nav-toggle');
  toggle.addEventListener('click', function () {
    var open = nav.classList.toggle('is-open');
    toggle.setAttribute('aria-expanded', open);
  });
})();
</script>
</body>
</html>
